included:
  - Sources
  - Extension
  - Tests

excluded:
  - .build
  - DerivedData
  - build
  - "*.xcodeproj"

disabled_rules:
  - trailing_whitespace
  - todo
  - force_try  # init-site try! in CameraExtensionStream is acceptable; developer-error only

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - literal_expression_end_indentation
  - multiline_arguments
  - multiline_function_chains
  - operator_usage_whitespace
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - unused_import
  - vertical_parameter_alignment_on_call

line_length:
  warning: 120
  error: 160
  ignores_urls: true
  ignores_function_declarations: false
  ignores_comments: true

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length: 2
  max_length: 50
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - k
    - l
    - m
    - n
    - o
    - p
    - q
    - d
    - r
    - g
    - b
    - a
    - w
    - h
    - t
    - s
    - c
    - e
    - f
    - u
    - v
