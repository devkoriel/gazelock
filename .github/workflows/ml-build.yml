name: ML Build

on:
  pull_request:
    branches: [main]
    paths:
      - "ML/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/ml-build.yml"
  push:
    branches: [main]
    paths:
      - "ML/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Makefile"
      - ".github/workflows/ml-build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ml-test:
    name: ML Test (macOS 15, Apple Silicon)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Cache uv env
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Cache torch hub (VGG-16 weights)
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch
          key: torch-${{ runner.os }}

      - name: Sync deps + install package
        run: |
          [[ -d .venv ]] || uv venv --python 3.12
          uv sync --extra dev --no-install-project
          uv pip install -e .

      - name: Lint
        run: make ml-lint

      - name: Test (fast)
        run: make ml-test

      - name: Smoke train
        run: make ml-train

      - name: Smoke export
        run: uv run gazelock-export --checkpoint weights/debug/final.pt --output weights/refiner.mlpackage --samples 16

      - name: Upload .mlpackage as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: refiner-mlpackage
          path: weights/refiner.mlpackage
          retention-days: 7
